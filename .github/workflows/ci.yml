name: ci

# PILOT: org-level reusable-workflow caller (scitex-ai/.github, 2026-07-10).
# Replaces the formerly-inlined 4 jobs (pytest-matrix, import-smoke, audit,
# docs-sphinx) with thin `uses:` calls into scitex-ai/.github reusable
# workflows — same job bodies, now centrally maintained instead of
# fleet-synced-by-copy. Triggers/concurrency preserved verbatim from the
# prior canonical `ci.yml`.
#
# Caller job ids are chosen so the resulting required-status-check context
# is predictable: "<job id> / <reusable job name>". These NEW context
# strings do not match the OLD required-status-check contexts on
# develop/main branch protection (see PR description) — branch protection
# must be updated as part of merging this PR.
# ============================================================================

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  schedule:
    - cron: "0 17 * * *" # nightly 17:00 UTC (~02:00 JST), off-peak
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest-matrix:
    # New required-status-check context: "pytest-matrix / pytest-matrix-on-ubuntu-py<X.YY>"
    uses: scitex-ai/.github/.github/workflows/pytest-matrix.yml@main
    secrets: inherit

  import-smoke:
    # New required-status-check context: "import-smoke / import-smoke-on-ubuntu-py3-12"
    uses: scitex-ai/.github/.github/workflows/import-smoke.yml@main
    secrets: inherit

  quality-audit:
    # New required-status-check context: "quality-audit / audit"
    uses: scitex-ai/.github/.github/workflows/quality-audit.yml@main
    secrets: inherit

  rtd-sphinx-build:
    # New required-status-check context: "rtd-sphinx-build / docs-sphinx"
    uses: scitex-ai/.github/.github/workflows/rtd-sphinx-build.yml@main
    secrets: inherit
